name: Daily market intelligence scrape

on:
  schedule:
    # 06:00 BRT = 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: market-intel

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: market-intel/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily scrape + extract
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          IG_SESSION_ID: ${{ secrets.IG_SESSION_ID }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
        run: python run_daily.py

      - name: Commit updated database
        run: |
          git config user.name "market-intel-bot"
          git config user.email "bot@example.com"
          git add market_intel.db last_run.json raw_posts/ || true
          git diff --cached --quiet || git commit -m "chore: daily market intel update $(date -u +%Y-%m-%d)"
          git push
